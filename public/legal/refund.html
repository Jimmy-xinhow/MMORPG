  <body class="legal-page">
    <main class="legal-document">
      <article>
        <p class="section-kicker">Support</p>
        <h1>退款與客服</h1>
        <p>若發生交易異常、重複扣款、未收到禮包或開包紀錄錯誤，可提出客服申請。</p>
        <h2>可受理情境</h2>
        <ul>
          <li>系統重複收取費用或交易未正確入帳。</li>
          <li>禮包狀態、開包紀錄或票券消耗出現系統錯誤。</li>
          <li>帳號遭盜用或交易被風控凍結，需要人工覆核。</li>
        </ul>
        <h2>不適用情境</h2>
        <ul>
          <li>已完成且無系統錯誤的開包結果。</li>
          <li>要求將遊戲資產、交易差額或獎勵換成現金。</li>
          <li>違反服務條款、洗交易或自動化濫用造成的限制。</li>
        </ul>
        <p><a href="/">返回首頁</a></p>
      </article>
    </main>
  </body>
</html>
